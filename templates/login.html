<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>
        body{
            background:#121212;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:#1f1f1f;
            padding:30px;
            border-radius:10px;
            width:300px;
        }

        h2{
            color:#ffb300;
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            background:#2b2b2b;
            color:white;
            border:none;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:10px;
            background:#ffb300;
            color:black;
            border:none;
            border-radius:5px;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="login-box">

    <h2>Admin Login</h2>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username">

        <input type="password"
               name="password"
               placeholder="Password">

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
